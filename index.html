    <style>
        :root {
            --primary: #00f3ff; 
            --accent: #ff0055;  
            --bg-dark: #07090e; 
            --card-bg: rgba(22, 32, 51, 0.45); 
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --war-red: #ff3333;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif, "Microsoft JhengHei"; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.7;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 243, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(255, 0, 85, 0.07) 0%, transparent 40%);
            background-attachment: fixed;
            padding-top: 120px; 
        }

        .war-banner {
            background: linear-gradient(90deg, #b30000, var(--war-red), #b30000);
            color: #fff; text-align: center; padding: 0.5rem 1rem; font-size: 0.95rem; font-weight: bold;
            letter-spacing: 2px; box-shadow: 0 2px 15px rgba(255, 0, 0, 0.4); position: fixed; top: 0; width: 100%; z-index: 1001;
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 0% { opacity: 0.9; } 50% { opacity: 1; text-shadow: 0 0 10px #fff; } 100% { opacity: 0.9; } }

        header { background: rgba(7, 9, 14, 0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border-bottom: 1px solid rgba(0, 243, 255, 0.2); position: fixed; width: 100%; top: 35px; z-index: 1000; }
        .navbar { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 1rem 2rem; gap: 1rem; }

        .nav-links { display: flex; list-style: none; gap: 2rem; }
        .nav-links a { color: var(--text-main); text-decoration: none; transition: all 0.3s; font-weight: 500; font-size: 1rem; letter-spacing: 1px; white-space: nowrap; }
        .nav-links a:hover, .nav-links a.active { color: var(--primary); text-shadow: 0 0 8px rgba(0, 243, 255, 0.6); }

        .hero { height: 30vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 0 1rem; }
        .hero h1 { font-size: 3.5rem; font-weight: 900; margin-bottom: 0.8rem; letter-spacing: 5px; background: linear-gradient(45deg, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 2px 8px rgba(0,243,255,0.3)); }
        .hero p { font-size: 1.25rem; color: var(--primary); max-width: 600px; letter-spacing: 2px; font-weight: 600; text-shadow: 0 0 8px rgba(0, 243, 255, 0.4); }

        .container { max-width: 1000px; margin: 0 auto; padding: 1rem 1.5rem 6rem 1.5rem; }
        section { margin-bottom: 4rem; }
        h2 { font-size: 1.9rem; color: #ffffff; margin-bottom: 2.5rem; display: flex; align-items: center; gap: 12px; }
        h2::before { content: ''; display: inline-block; width: 4px; height: 24px; background: var(--primary); box-shadow: 0 0 10px var(--primary); }

        .status-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; margin-bottom: 4rem; }
        .status-card { background: var(--card-bg); border: 1px solid rgba(255, 255, 255, 0.06); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); padding: 1.5rem; border-radius: 12px; text-align: center; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4); border-top: 2px solid rgba(0, 243, 255, 0.3); }
        .status-card.war { border-top: 2px solid var(--war-red); background: rgba(40, 15, 25, 0.45); }
        .status-label { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 0.5rem; letter-spacing: 1px; }
        .status-value { font-size: 1.35rem; font-weight: 700; color: var(--primary); }
        .status-value.alert { color: var(--war-red); text-shadow: 0 0 10px rgba(255, 51, 51, 0.6); }

        .docs-section-card { background: var(--card-bg); border: 1px solid rgba(0, 243, 255, 0.2); border-radius: 16px; padding: 2.5rem; text-align: center; box-shadow: 0 0 30px rgba(0, 243, 255, 0.1); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
        .docs-section-card p { color: var(--text-muted); margin-bottom: 1.5rem; font-size: 1.05rem; letter-spacing: 1px; }
        .btn-link-docs { display: inline-block; background: linear-gradient(135deg, #00d2ff, #0066ff); color: #ffffff; text-decoration: none; padding: 14px 40px; font-size: 1.15rem; font-weight: bold; border-radius: 8px; letter-spacing: 2px; box-shadow: 0 0 15px rgba(0, 102, 255, 0.4); transition: all 0.3s ease; border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-link-docs:hover { transform: translateY(-2px); box-shadow: 0 0 25px rgba(0, 243, 255, 0.7); background: linear-gradient(135deg, #00f3ff, #0055ff); }

        footer { background-color: #040508; text-align: center; padding: 2.5rem; color: #4b5563; border-top: 1px solid rgba(255, 255, 255, 0.05); font-size: 0.9rem; letter-spacing: 1px; }

        @media (max-width: 850px) {
            body { padding-top: 150px; } header { top: 55px; }
            .navbar { flex-direction: column; gap: 0.8rem; padding: 0.8rem 1rem; }
            .nav-links { gap: 1.5rem; justify-content: center; width: 100%; }
            .hero h1 { font-size: 2.6rem; }
        }
    </style>
